<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>QR</title>
</head>
<body>

<img id="qr" src="/api/qr" width="300">

<script>
const qr = document.getElementById("qr");

const events = new EventSource("/api/events");

events.onmessage = (event) => {
    if (event.data === "scanned") {
        qr.style.display = "none";
    }
};
</script>

</body>
</html>
